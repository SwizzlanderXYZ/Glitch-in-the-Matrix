<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Matrix Calculator</title>
    <style>
        /* Bold, high-contrast theme */
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background-color: #000000; /* Black background */
            color: #00FF00; /* Neon Green text */
            text-align: center; 
            padding: 20px;
        }
        .container { 
            background: #1a1a1a; 
            width: 90%; 
            max-width: 800px;
            margin: auto; 
            padding: 30px; 
            border: 5px solid #FF00FF; /* Bold Magenta border */
            box-shadow: 10px 10px 0px #00FFFF; /* Cyan offset shadow */
        }
        h1 { 
            color: #FFFF00; /* Bright Yellow */
            text-transform: uppercase;
            font-size: 32px;
            border-bottom: 3px double #FFFF00;
            display: inline-block;
        }
        .menu { 
            margin: 20px 0; 
            padding: 15px; 
            background: #333; 
            border: 2px solid white;
        }
        button { 
            padding: 12px 20px; 
            margin: 5px; 
            cursor: pointer; 
            font-weight: bold; 
            border: 3px solid #000;
            background-color: #FF0000; /* Bright Red */
            color: white;
        }
        button:hover {
            background-color: white;
            color: black;
        }
        .matrix-area { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 20px; }
        .grid { 
            display: grid; 
            gap: 10px; 
            padding: 15px; 
            background: #222;
            border-left: 5px solid #00FFFF; 
            border-right: 5px solid #00FFFF; 
        }
        input { 
            width: 60px; 
            height: 40px; 
            text-align: center; 
            font-size: 18px; 
            font-weight: bold;
            background: #000;
            color: #FFFF00;
            border: 2px solid #555;
        }
        #result { 
            margin-top: 40px; 
            padding: 20px; 
            border: 4px dashed #00FF00; 
            background: #081c08;
        }
        .hidden { display: none; }
        #opTitle { color: #00FFFF; }
    </style>
</head>
<body>

<div class="container">
    <h1>Matrix Calculator</h1>
    
    <div class="menu">
        <button onclick="setOp('Add')">ADD</button>
        <button onclick="setOp('Subtract')">SUBTRACT</button>
        <button onclick="setOp('Multiply')">MULTIPLY</button>
        <button onclick="setOp('Transpose')">TRANSPOSE</button>
        <button onclick="setOp('Inverse')">INVERSE</button>
    </div>

    <div id="setup">
        ROWS: <input type="number" id="rows" value="2" min="1" max="5"> 
        COLS: <input type="number" id="cols" value="2" min="1" max="5">
        <br><br>
        <button onclick="generateInputs()" style="background-color: #00FF00; color: black;">GENERATE MATRIX</button>
    </div>

    <h2 id="opTitle">Operation: None</h2>

    <div class="matrix-area">
        <div id="m1-container" class="hidden">
            <p>MATRIX A</p>
            <div id="matrix1" class="grid"></div>
        </div>
        <div id="operator-sign" style="font-size: 40px; font-weight: bold; color: #FF00FF;"></div>
        <div id="m2-container" class="hidden">
            <p>MATRIX B</p>
            <div id="matrix2" class="grid"></div>
        </div>
    </div>

    <div id="calc-btn-container" class="hidden">
        <br><button onclick="calculate()" style="background-color: #FFFF00; color: black; width: 100%; font-size: 20px;">== CALCULATE ==</button>
    </div>

    <div id="result">
        <h3>RESULT:</h3>
        <div id="res-grid" class="grid" style="display: inline-grid; min-width: 50px;"></div>
        <p id="error-msg" style="color: #FF0000; font-weight: bold;"></p>
    </div>
</div>

<script>
    let currentOp = '';
    const getVal = (id) => parseInt(document.getElementById(id).value);

    function setOp(op) {
        currentOp = op;
        document.getElementById('opTitle').innerText = "Operation: " + op;
        document.getElementById('operator-sign').innerText = (op==='Add') ? '+' : (op==='Subtract') ? '-' : (op==='Multiply') ? '×' : '';
        document.getElementById('m2-container').classList.toggle('hidden', op === 'Transpose' || op === 'Inverse');
    }

    function createGrid(el, r, c) {
        el.innerHTML = '';
        el.style.gridTemplateColumns = `repeat(${c}, 1fr)`;
        for (let i = 0; i < r * c; i++) {
            el.innerHTML += `<input type="number" class="m-cell" value="0">`;
        }
    }

    function generateInputs() {
        if (!currentOp) return alert("Select operation first!");
        const r = getVal('rows'), c = getVal('cols');
        document.getElementById('m1-container').classList.remove('hidden');
        createGrid(document.getElementById('matrix1'), r, c);
        
        if (currentOp !== 'Transpose' && currentOp !== 'Inverse') {
            document.getElementById('m2-container').classList.remove('hidden');
            createGrid(document.getElementById('matrix2'), r, c);
        }
        document.getElementById('calc-btn-container').classList.remove('hidden');
    }

    function getMatrixData(container) {
        const inputs = container.querySelectorAll('input');
        const r = getVal('rows'), c = getVal('cols');
        let data = [], row = [];
        inputs.forEach((ins, idx) => {
            row.push(parseFloat(ins.value));
            if ((idx + 1) % c === 0) { data.push(row); row = []; }
        });
        return data;
    }

    function displayResult(mat) {
        const resGrid = document.getElementById('res-grid');
        resGrid.innerHTML = '';
        if(!mat || mat.length === 0) return;
        resGrid.style.gridTemplateColumns = `repeat(${mat[0].length}, 1fr)`;
        mat.forEach(row => row.forEach(v => {
            resGrid.innerHTML += `<div style="padding:15px; border:2px solid #00FFFF; background: #000; color: #FFF;">${Number.isInteger(v) ? v : v.toFixed(2)}</div>`;
        }));
    }

    function calculate() {
        const a = getMatrixData(document.getElementById('matrix1'));
        const r = a.length, c = a[0].length;
        let res = [];
        document.getElementById('error-msg').innerText = "";

        if (currentOp === 'Add' || currentOp === 'Subtract') {
            const b = getMatrixData(document.getElementById('matrix2'));
            res = a.map((row, i) => row.map((val, j) => currentOp === 'Add' ? val + b[i][j] : val - b[i][j]));
        } 
        else if (currentOp === 'Transpose') {
            for(let j=0; j<c; j++) {
                let newRow = [];
                for(let i=0; i<r; i++) newRow.push(a[i][j]);
                res.push(newRow);
            }
        }
        else if (currentOp === 'Inverse') {
            if (r !== c) return document.getElementById('error-msg').innerText = "ERROR: MUST BE SQUARE MATRIX!";
            if (r === 2) {
                let det = a[0][0]*a[1][1] - a[0][1]*a[1][0];
                if (det === 0) return document.getElementById('error-msg').innerText = "ERROR: DETERMINANT IS 0!";
                res = [[a[1][1]/det, -a[0][1]/det], [-a[1][0]/det, a[0][0]/det]];
            } else {
                document.getElementById('error-msg').innerText = "LIMITATION: INVERSE ONLY CODED FOR 2x2!";
            }
        }
        displayResult(res);
    }
</script>

</body>
</html>
